<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalender</title>
<style>
:root{--bg:#07111f;--card:#0d1a2b;--line:rgba(255,255,255,.12);--text:#e8eefc;--muted:#9fb0d0;--accent:#60a5fa;--accent2:#6ee7b7}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#12213d,#07111f 50%);color:var(--text);min-height:100vh}
.wrap{max-width:1400px;margin:0 auto;padding:32px}.title{font-size:clamp(2rem,4vw,3.2rem);margin:0 0 8px}.subtitle{color:var(--muted);margin:0 0 24px;max-width:900px;line-height:1.5}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 16px 50px rgba(0,0,0,.25)}
.badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:rgba(96,165,250,.14);border:1px solid rgba(96,165,250,.26);color:#cfe3ff;font-size:.92rem;margin-bottom:14px;width:max-content}
input,textarea,button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#09111d;color:var(--text);font-size:1rem;outline:none}textarea{min-height:110px;resize:vertical}
button{cursor:pointer;background:linear-gradient(135deg,#60a5fa,#6ee7b7);font-weight:800;border:0}
.monthbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.monthbar button{width:auto;padding:10px 14px}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.dow,.day{border-radius:16px;border:1px solid var(--line);min-height:78px;background:rgba(255,255,255,.04);padding:10px;position:relative}.dow{min-height:auto;text-align:center;font-weight:800;color:#cfe3ff;background:rgba(96,165,250,.12)}
.day{cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:.15s transform,.15s border-color}.day:hover{transform:translateY(-2px);border-color:rgba(110,231,183,.34)}.num{font-size:1.05rem;font-weight:800}.today{outline:2px solid rgba(110,231,183,.7)}.hasnote{background:linear-gradient(180deg,rgba(110,231,183,.15),rgba(255,255,255,.03))}.selected{border-color:#60a5fa;box-shadow:inset 0 0 0 2px rgba(96,165,250,.35)}
.note-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}.note-item{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.muted{color:var(--muted)}
@media (max-width: 1000px){.grid{grid-template-columns:1fr}.card{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">Kalender</h1>
  <p class="subtitle">Klicke auf einen Tag, schreibe eine Notiz oder Erinnerung hinein, und sie bleibt im Browser gespeichert. So kann Janiks Life Changing Tool dich später daran erinnern, sobald du diese Seite wieder öffnest.</p>
  <div class="grid">
    <div class="card">
      <div class="badge">Eintrag</div>
      <div class="muted" id="selectedLabel">Kein Tag ausgewählt</div>
      <div style="height:10px"></div>
      <input id="noteTitle" placeholder="Titel, z. B. Arzttermin">
      <div style="height:10px"></div>
      <textarea id="noteText" placeholder="Notiz / Erinnerung"></textarea>
      <div style="height:10px"></div>
      <button id="saveBtn">Speichern</button>
      <div style="height:14px"></div>
      <div class="badge">Gespeichert für diesen Tag</div>
      <div class="note-list" id="dayNotes"></div>
    </div>
    <div class="card">
      <div class="monthbar">
        <button id="prevBtn">←</button>
        <div class="badge" id="monthLabel">Monat</div>
        <button id="nextBtn">→</button>
      </div>
      <div class="calendar" id="calendar"></div>
    </div>
  </div>
</div>
<script>
const calendar=document.getElementById('calendar');
const monthLabel=document.getElementById('monthLabel');
const selectedLabel=document.getElementById('selectedLabel');
const noteTitle=document.getElementById('noteTitle');
const noteText=document.getElementById('noteText');
const saveBtn=document.getElementById('saveBtn');
const dayNotes=document.getElementById('dayNotes');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
const months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
let now=new Date(); let viewYear=now.getFullYear(); let viewMonth=now.getMonth(); let selectedKey='';
const storeKey='janiks_life_changing_tool_calendar'; const homeKey='janiks_life_changing_tool_home_reminders';
const data=JSON.parse(localStorage.getItem(storeKey)||'{}');
function key(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function save(){localStorage.setItem(storeKey,JSON.stringify(data)); const reminders=Object.entries(data).map(([date,v])=>({date,title:v.title,text:v.text})).filter(x=>x.title||x.text); localStorage.setItem(homeKey,JSON.stringify(reminders));}
function render(){calendar.innerHTML=''; monthLabel.textContent=`${months[viewMonth]} ${viewYear}`; dow.forEach(d=>{const el=document.createElement('div');el.className='dow';el.textContent=d;calendar.appendChild(el)}); const first=new Date(viewYear,viewMonth,1); const start=first.getDay(); const days=new Date(viewYear,viewMonth+1,0).getDate(); for(let i=0;i<start;i++){const e=document.createElement('div'); e.className='day'; e.style.opacity=.25; calendar.appendChild(e)} for(let d=1; d<=days; d++){const k=key(viewYear,viewMonth,d); const e=document.createElement('div'); e.className='day'; if(data[k]) e.classList.add('hasnote'); if(k===selectedKey) e.classList.add('selected'); if(viewYear===now.getFullYear()&&viewMonth===now.getMonth()&&d===now.getDate()) e.classList.add('today'); e.innerHTML=`<div class="num">${d}</div><div class="muted">${data[k]?.title||''}</div>`; e.onclick=()=>selectDate(viewYear,viewMonth,d); calendar.appendChild(e)} renderNotes(); }
function selectDate(y,m,d){selectedKey=key(y,m,d); selectedLabel.textContent=`Ausgewählt: ${d}. ${months[m]} ${y}`; noteTitle.value=data[selectedKey]?.title||''; noteText.value=data[selectedKey]?.text||''; render(); }
function renderNotes(){dayNotes.innerHTML=selectedKey&&data[selectedKey]?`<div class="note-item"><strong>${data[selectedKey].title||'Ohne Titel'}</strong><div class="muted" style="margin-top:6px">${data[selectedKey].text||''}</div></div>`:'<div class="muted">Keine Einträge für diesen Tag.</div>'}
saveBtn.onclick=()=>{if(!selectedKey)return; data[selectedKey]={title:noteTitle.value.trim(), text:noteText.value.trim()}; save(); render();}; prevBtn.onclick=()=>{viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;} render();}; nextBtn.onclick=()=>{viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;} render();}; render();
</script>
</body>
</html>
